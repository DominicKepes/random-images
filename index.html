<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>img</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    img.visible { opacity: 1; }
  </style>
</head>
<body>

  <img id="img" alt="" />

  <script>
    const STORAGE_KEY = "img_counts";

    function getCounts() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveCounts(counts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
    }

    // Weight = 1 / (1 + times_shown)^1.5
    // Unseen = 1.0, shown once ~0.35, shown twice ~0.19, etc.
    // All equal when all shown equally — naturally self-balancing.
    function pickImage(images) {
      const counts = getCounts();
      const weights = images.map(f => 1 / Math.pow(1 + (counts[f] || 0), 1.5));
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < images.length; i++) {
        r -= weights[i];
        if (r <= 0) return images[i];
      }
      return images[images.length - 1];
    }

    async function load() {
      const res = await fetch("manifest.json");
      const images = await res.json();
      if (!images.length) return;

      const file = pickImage(images);
      const counts = getCounts();
      counts[file] = (counts[file] || 0) + 1;
      saveCounts(counts);

      const el = document.getElementById('img');
      el.src = `img/${file}`;
      el.onload = () => el.classList.add('visible');
    }

    load();
  </script>

</body>
</html>
